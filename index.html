<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Perfect Input & View</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. 화면 유지: 게임 영역 최적화 */
        #game-wrapper {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #ruffle-container {
            width: 100%;
            height: 100%;
        }

        /* 2. 컨트롤러: 터치 반응성 향상을 위한 스타일 */
        #mobile-controller {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            background: #111;
            z-index: 100;
        }

        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 12px; }
        .btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.15);
            border: 2px solid #666; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; user-select: none; 
            /* 중요: 브라우저가 터치를 가로채지 못하게 방지 */
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn.active { background: rgba(255,255,255,0.5); transform: scale(0.9); border-color: #fff; }
        .fire { width: 100px; height: 100px; background: rgba(255,0,0,0.3); border-color: #f00; font-weight: bold; }

        @media (pointer: fine) { #mobile-controller { display: none; } #game-wrapper { height: 100vh; } }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container" tabindex="0"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="btn right" data-key="ArrowRight" data-code="39">▶</div>
            <div class="btn down" data-key="ArrowDown" data-code="40">▼</div>
        </div>
        <div class="btn fire" data-key=" " data-code="32">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll",
                forceScale: true
            }).then(() => {
                player.style.width = "100%";
                player.style.height = "100%";
                player.focus();
            });

            // 1. 입력 신뢰도 향상을 위한 핵심 로직 (Pointer Events + Window Dispatch)
            const sendKey = (type, key, code) => {
                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: parseInt(code),
                    which: parseInt(code),
                    bubbles: true,
                    cancelable: true
                });
                // Ruffle은 window 레벨에서 가로채는 신호를 가장 잘 인식합니다.
                window.dispatchEvent(event);
            };

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                const code = btn.getAttribute('data-code');

                // PointerDown은 TouchStart보다 지연 시간이 짧고 정확합니다.
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    btn.setPointerCapture(e.pointerId); // 손가락이 버튼을 벗어나도 끝까지 추적
                    btn.classList.add('active');
                    sendKey('keydown', key, code);
                });

                // 손가락을 떼거나 화면 밖으로 나갔을 때 처리
                const handleEnd = (e) => {
                    e.preventDefault();
                    if (btn.classList.contains('active')) {
                        btn.classList.remove('active');
                        sendKey('keyup', key, code);
                    }
                };

                btn.addEventListener('pointerup', handleEnd);
                btn.addEventListener('pointercancel', handleEnd);
                btn.addEventListener('pointerleave', handleEnd);
            });

            // PC 포커스 유지
            document.addEventListener('mousedown', () => player.focus());
        });
    </script>
</body>
</html>
