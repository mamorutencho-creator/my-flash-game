<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Responsive Full Recovery</title>
    <style>
        /* 1. 기본 레이아웃: 화면 크기에 맞춰 유동적으로 변화 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 게임 영역: 컨트롤러 제외 남은 공간을 100% 사용 (550px 제한 제거) */
        #game-wrapper {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* CSS aspect-ratio를 제거하고 Ruffle 내부 스케일링에 맡김 */
        #ruffle-container {
            width: 100%;
            height: 100%;
        }

        /* 2. 모바일 컨트롤러: 가상 키 배치 및 크기 최적화 */
        #mobile-controller {
            width: 100%;
            height: 200px; /* 터치하기 적당한 고정 높이 */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            background: #111;
            border-top: 1px solid #333;
        }

        /* D-Pad: 버튼이 겹치지 않도록 너비 고정 및 그리드 정돈 */
        .d-pad { 
            display: grid; 
            grid-template-areas: 
                ". up ." 
                "left . right" 
                ". down ."; 
            gap: 10px;
            width: 180px; 
        }

        .btn {
            width: 55px; height: 55px; 
            background: rgba(255,255,255,0.15);
            border: 2px solid #666; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; user-select: none; touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 터치 시 피드백 */
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        
        .fire { 
            width: 90px; height: 90px; 
            border-radius: 50%; 
            background: rgba(255,0,0,0.3); 
            border: 3px solid #f00; 
            font-weight: bold; font-size: 20px;
        }

        /* PC 환경: 컨트롤러 숨김 및 게임창 최대화 */
        @media (pointer: fine) { 
            #mobile-controller { display: none; } 
            #game-wrapper { height: 100vh; } 
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="btn right" data-key="ArrowRight" data-code="39">▶</div>
            <div class="btn down" data-key="ArrowDown" data-code="40">▼</div>
        </div>
        <div class="btn fire" data-key=" " data-code="32">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",   // 비율 유지하며 빈 공간 채움
                scale: "showAll",  // 화면 잘림 방지 핵심 (영역 안에 다 보여줌)
                forceScale: true   // 강제 스케일링
            }).then(() => {
                player.focus();
            });

            // PC 포커스 유지
            document.addEventListener('click', () => {
                if(player) player.focus();
            });

            // 사용자님이 만족하신 반응성 좋은 로직 (Direct Dispatch)
            const handleKey = (type, key, code) => {
                if(!player) return;
                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: parseInt(code),
                    which: parseInt(code),
                    bubbles: true,
                    cancelable: true
                });
                player.dispatchEvent(event);
            };

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                const code = btn.getAttribute('data-code');

                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleKey('keydown', key, code);
                });

                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleKey('keyup', key, code);
                });
            });
        });
    </script>
</body>
</html>
