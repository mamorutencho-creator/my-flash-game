<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heeroz Shooting Game - Mobile</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
        #ruffle-container { width: 100%; max-width: 550px; aspect-ratio: 550/400; outline: none; position: relative; }
        
        /* 가상 버튼 스타일 */
        .controller { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 100; }
        .d-pad, .action-btns { display: grid; gap: 10px; pointer-events: auto; }
        .d-pad { grid-template-areas: ". up ." "left . right" ". down ."; }
        
        .btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; display: flex; 
               justify-content: center; align-items: center; font-weight: bold; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: rgba(255,255,255,0.5); }

        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        .space { width: 80px; height: 80px; background: rgba(255,0,0,0.3); border-color: rgba(255,0,0,0.5); border-radius: 50%; }

        /* PC에서는 버튼 숨기기 (선택 사항) */
        @media (pointer: fine) { .controller { display: none; } }
    </style>
</head>
<body>

    <div id="ruffle-container" tabindex="0"></div>

    <div class="controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp">▲</div>
            <div class="btn left" data-key="ArrowLeft">◀</div>
            <div class="btn right" data-key="ArrowRight">▶</div>
            <div class="btn down" data-key="ArrowDown">▼</div>
        </div>
        <div class="action-btns">
            <div class="btn space" data-key=" ">FIRE</div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                unmuteOverlay: "hidden"
            });

            // 가상 버튼 이벤트 처리
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                
                // 터치 시작 시 키 눌림 신호 전송
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    window.dispatchEvent(new KeyboardEvent('keydown', { key: key }));
                });

                // 터치 종료 시 키 뗌 신호 전송
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    window.dispatchEvent(new KeyboardEvent('keyup', { key: key }));
                });
            });

            // 초기 포커스 설정
            container.focus();
        });
    </script>
</body>
</html>
