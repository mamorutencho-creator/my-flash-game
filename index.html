<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Final Responsive Fix</title>
    <style>
        /* 1. 기본 레이아웃: 화면 잘림 방지 및 반응형 설정 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 게임 컨테이너: 상단 영역을 유연하게 사용하여 화면 잘림 해결 */
        #game-wrapper {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            overflow: hidden;
        }

        #ruffle-container {
            width: 100%;
            height: 100%;
            /* 원본 비율 유지 및 잘림 방지 */
            max-width: 100vw;
            max-height: 100%;
            aspect-ratio: 550 / 400;
        }

        /* 2. 모바일 컨트롤러 배치 수정: 간격과 위치 최적화 */
        #mobile-controller {
            width: 100%;
            height: 220px; /* 조작성을 위해 높이 확보 */
            display: flex;
            justify-content: space-around; /* 방향키와 발사키를 양쪽으로 배치 */
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            background: #000;
            border-top: 1px solid #333;
        }

        /* D-PAD: 십자 형태를 더 명확하게 개선 */
        .d-pad { 
            display: grid; 
            grid-template-areas: 
                ". up ." 
                "left . right" 
                ". down ."; 
            gap: 8px; 
        }

        .btn {
            width: 60px; height: 60px; 
            background: rgba(255,255,255,0.15);
            border: 2px solid #666; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; user-select: none; touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 터치 시 시각적 피드백 */
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        
        /* 발사 버튼 크기 및 가독성 개선 */
        .fire { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            background: rgba(255,0,0,0.3); 
            border: 3px solid #f00; 
            font-weight: bold; 
            font-size: 20px;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }

        /* PC 환경에서는 컨트롤러 숨김 */
        @media (pointer: fine) { 
            #mobile-controller { display: none; } 
            #game-wrapper { height: 100vh; } 
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="btn right" data-key="ArrowRight" data-code="39">▶</div>
            <div class="btn down" data-key="ArrowDown" data-code="40">▼</div>
        </div>
        <div class="btn fire" data-key=" " data-code="32">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll",
                forceScale: true
            }).then(() => {
                player.focus();
            });

            // PC 포커스 유지
            document.addEventListener('click', () => {
                if(player) player.focus();
            });

            // 사용자님이 만족하신 직접 주입(Direct Dispatch) 반응성 로직
            const handleKey = (type, key, code) => {
                if(!player) return;
                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: parseInt(code),
                    which: parseInt(code),
                    bubbles: true,
                    cancelable: true
                });
                player.dispatchEvent(event);
            };

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                const code = btn.getAttribute('data-code');

                // 터치 이벤트 최적화
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleKey('keydown', key, code);
                });

                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleKey('keyup', key, code);
                });
                
                // 손가락이 버튼 밖으로 나갔을 때 키가 눌린 채 멈추는 현상 방지
                btn.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    handleKey('keyup', key, code);
                });
            });
        });
    </script>
</body>
</html>
