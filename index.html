<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Full Screen Recovery</title>
    <style>
        /* 1. 기본 레이아웃: 화면 전체 사용 및 스크롤 방지 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 2. 게임 wrapper: 컨트롤러를 제외한 남은 공간을 모두 사용 (사용자 지정 소스) */
        #game-wrapper {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden; 
        }

        /* 3. Ruffle 컨테이너: wrapper 안에서 최대 크기로 확장 */
        #ruffle-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 4. 모바일 컨트롤러: 하단 영역 고정 (사용자 지정 180px) */
        #mobile-controller {
            width: 100%;
            height: 180px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            box-sizing: border-box;
            background: #111;
            border-top: 1px solid #333;
            z-index: 10;
        }

        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border: 2px solid #555; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; user-select: none; touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        .fire { width: 90px; height: 90px; background: rgba(255,0,0,0.3); border-color: #f00; font-weight: bold; font-size: 20px; }

        /* PC 환경 최적화: 컨트롤러 숨김 및 높이 100% 확장 (사용자 지정 소스) */
        @media (pointer: fine) { 
            #mobile-controller { display: none; } 
            #game-wrapper { height: 100vh; } 
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="btn right" data-key="ArrowRight" data-code="39">▶</div>
            <div class="btn down" data-key="ArrowDown" data-code="40">▼</div>
        </div>
        <div class="btn fire" data-key=" " data-code="32">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            // 사용자 지정 화면 스케일링 설정
            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll",
                forceScale: true
            }).then(() => {
                player.style.width = "100%";
                player.style.height = "100%";
                player.focus();
            }).catch((err) => {
                console.error("Flash Load Error:", err);
            });

            // PC 포커스 유지
            document.addEventListener('mousedown', () => {
                if(player) player.focus();
            });

            // 사용자 지정 가상 키 입력 로직 (반응성 검증됨)
            const handleKey = (type, key, code) => {
                if (!player) return;
                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: parseInt(code),
                    which: parseInt(code),
                    bubbles: true,
                    cancelable: true
                });
                player.dispatchEvent(event);
            };

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                const code = btn.getAttribute('data-code');

                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleKey('keydown', key, code);
                });

                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleKey('keyup', key, code);
                });
            });
        });
    </script>
</body>
</html>
