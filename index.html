<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Final Optimized</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. 화면 잘림 해결: 상단 게임 영역을 유연하게 설정 */
        #game-wrapper {
            width: 100%;
            flex: 1; /* 남은 공간 모두 사용 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 영역 밖으로 나가는 것 방지 */
            background: #111;
        }

        #ruffle-container {
            width: 100%;
            height: auto;
            max-width: 100vw;
            aspect-ratio: 550 / 400; /* 원본 비율 유지 */
            outline: none;
        }

        /* 2. 하단 컨트롤러 영역 */
        #mobile-controller {
            width: 100%;
            height: 35vh; /* 컨트롤러 높이 고정 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            background: #000;
            z-index: 100;
        }

        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; user-select: none; touch-action: none;
        }
        /* 버튼 반응 효과 */
        .btn.active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
        
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        .fire { width: 90px; height: 90px; background: rgba(255,0,0,0.3); border-color: rgba(255,0,0,0.5); font-weight: bold; }

        /* PC 모드: 컨트롤러 숨김 및 게임창 전체화 */
        @media (pointer: fine) { 
            #mobile-controller { display: none; } 
            #game-wrapper { height: 100%; } 
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container" tabindex="0"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp">▲</div>
            <div class="btn left" data-key="ArrowLeft">◀</div>
            <div class="btn right" data-key="ArrowRight">▶</div>
            <div class="btn down" data-key="ArrowDown">▼</div>
        </div>
        <div class="btn fire" data-key=" ">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",  // 화면 비율 유지
                scale: "showAll", // 잘림 방지 핵심 설정
                forceScale: true
            });

            // PC 포커스 문제 해결
            document.addEventListener('click', () => container.focus());

            // 3. 사용자님이 만족하셨던 이전 키 로직 (Pointer Events) 복구
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                
                const handleStart = (e) => {
                    e.preventDefault();
                    btn.classList.add('active');
                    window.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
                };

                const handleEnd = (e) => {
                    e.preventDefault();
                    btn.classList.remove('active');
                    window.dispatchEvent(new KeyboardEvent('keyup', { key: key, bubbles: true }));
                };

                btn.addEventListener('pointerdown', handleStart);
                btn.addEventListener('pointerup', handleEnd);
                btn.addEventListener('pointerleave', handleEnd); // 버튼 밖으로 나가도 취소
            });
        });
    </script>
</body>
</html>
