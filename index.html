<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heeroz Shooting Game - Final Fix</title>
    <style>
        /* 1. 화면 잘림 방지: 유연한 레이아웃 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; /* 브라우저 확대/스크롤 방지 */
        }

        /* 게임 영역: 화면 크기에 맞춰 가변적으로 조절 */
        #ruffle-container { 
            width: 100%; 
            max-width: 550px; 
            aspect-ratio: 550 / 400; 
            outline: none;
            position: relative;
            margin-top: 10px;
        }

        /* 2. 가상 컨트롤러: 터치 간섭 최소화 */
        .controller { 
            position: fixed; bottom: 30px; 
            width: 100%; max-width: 500px;
            display: flex; justify-content: space-between; 
            padding: 0 25px; box-sizing: border-box; 
            z-index: 100; pointer-events: none;
        }

        .d-pad, .action-btns { pointer-events: auto; }
        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 12px; }
        
        .btn { 
            width: 65px; height: 65px; 
            background: rgba(255,255,255,0.2); 
            border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 50%; color: white; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { background: rgba(255,255,255,0.6); }
        .space { width: 85px; height: 85px; background: rgba(255,0,0,0.3); border-color: rgba(255,0,0,0.5); }

        /* PC에서는 컨트롤러 숨김 */
        @media (pointer: fine) { .controller { display: none; } }
    </style>
</head>
<body>

    <div id="ruffle-container" tabindex="0"></div>

    <div class="controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp">▲</div>
            <div class="btn left" data-key="ArrowLeft">◀</div>
            <div class="btn right" data-key="ArrowRight">▶</div>
            <div class="btn down" data-key="ArrowDown">▼</div>
        </div>
        <div class="action-btns">
            <div class="btn space" data-key=" ">FIRE</div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll" // 3. 화면 잘림 해결 핵심 설정
            });

            // 1. PC/모바일 포커스 통합 해결
            document.addEventListener('touchstart', () => container.focus(), {passive: true});
            document.addEventListener('mousedown', () => container.focus());

            // 2. 모바일 터치 입력 방식 교체 (Direct Event Dispatch)
            const buttons = document.querySelectorAll('.btn');
            const simulateKey = (type, key) => {
                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: key === ' ' ? 32 : 0, // 스페이스바 호환성
                    bubbles: true,
                    cancelable: true
                });
                // 윈도우와 컨테이너 양쪽에 신호를 보냅니다
                window.dispatchEvent(event);
                container.dispatchEvent(event);
            };

            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                
                // 터치 시 신호 발생
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    simulateKey('keydown', key);
                }, {passive: false});

                // 터치 뗄 때 신호 발생
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    simulateKey('keyup', key);
                }, {passive: false});
            });
        });
    </script>
</body>
</html>
