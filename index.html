<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heeroz Shooting Game - Final</title>
    <style>
        /* 1. 화면 잘림 해결: 전체 레이아웃 설정 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            touch-action: none; /* 브라우저 기본 제스처 방지 */
        }

        /* 게임 컨테이너: 550:400 비율 유지 및 자동 크기 조절 */
        #ruffle-container { 
            width: 95vw; /* 화면 너비의 95% 사용 */
            max-width: 550px; 
            aspect-ratio: 550 / 400; 
            outline: none; 
            position: relative;
            z-index: 1;
        }

        /* 2. 모바일 컨트롤러 개선 */
        .controller { 
            position: fixed; bottom: env(safe-area-inset-bottom, 20px); 
            width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px 30px 30px; box-sizing: border-box; 
            pointer-events: none; z-index: 100;
        }

        .d-pad, .action-btns { pointer-events: auto; }
        
        /* D-Pad 레이아웃: 터치 영역 겹침 방지 */
        .d-pad { 
            display: grid; 
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 8px;
        }
        
        .btn { 
            width: 65px; height: 65px; 
            background: rgba(255,255,255,0.15); 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; color: white; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; user-select: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        
        /* 버튼 활성화 시 시각적 피드백 */
        .btn.active { background: rgba(255,255,255,0.5); transform: scale(0.9); }

        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        .space { width: 90px; height: 90px; background: rgba(255,0,0,0.25); border-color: rgba(255,0,0,0.4); font-weight: bold; }

        /* PC에서는 컨트롤러 숨기기 */
        @media (pointer: fine) { .controller { display: none; } }
    </style>
</head>
<body>

    <div id="ruffle-container" tabindex="0"></div>

    <div class="controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp">▲</div>
            <div class="btn left" data-key="ArrowLeft">◀</div>
            <div class="btn right" data-key="ArrowRight">▶</div>
            <div class="btn down" data-key="ArrowDown">▼</div>
        </div>
        <div class="action-btns">
            <div class="btn space" data-key=" ">FIRE</div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let rufflePlayer = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            rufflePlayer = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(rufflePlayer);

            rufflePlayer.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll", // 화면 크기에 맞게 자동 확장
                forceScale: true
            });

            // 1. PC 키보드 포커스 문제 해결
            // 화면 어디든 클릭하면 게임창에 포커스를 강제로 줍니다.
            document.addEventListener('click', () => container.focus());
            
            // 2. 모바일 오른쪽 키 및 인식 개선 (Pointer Events 사용)
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                
                const handleStart = (e) => {
                    e.preventDefault();
                    btn.classList.add('active');
                    // Ruffle에 키 누름 이벤트 직접 전달
                    window.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
                };

                const handleEnd = (e) => {
                    e.preventDefault();
                    btn.classList.remove('active');
                    window.dispatchEvent(new KeyboardEvent('keyup', { key: key, bubbles: true }));
                };

                // 터치와 마우스 모두 대응하는 Pointer 이벤트
                btn.addEventListener('pointerdown', handleStart);
                btn.addEventListener('pointerup', handleEnd);
                btn.addEventListener('pointerleave', handleEnd); // 버튼 밖으로 손가락이 나갔을 때
            });

            container.focus();
        });
    </script>
</body>
</html>
