<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Heeroz Shooting Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        /* 게임 컨테이너: 키보드 입력을 받기 위해 outline을 제거합니다 */
        #ruffle-container { width: 550px; height: 400px; outline: none; position: relative; }
        #ruffle-container:focus { border: 1px solid #4CAF50; } /* 포커스 시 살짝 녹색 테두리 (확인용) */
        
        /* 안내 문구: 클릭해야 조작이 시작됨을 알립니다 */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); color: white; 
                   display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="ruffle-container" tabindex="0">
        <div id="overlay">
            <p style="font-size: 20px;">비행기 조종을 위해</p>
            <p style="font-size: 24px; font-weight: bold;">[ 화면을 클릭하세요 ]</p>
            <p style="font-size: 14px; color: #ccc;">(화살표 키: 이동 / 스페이스바: 발사)</p>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            const overlay = document.getElementById("overlay");
            
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on"
            });

            // 화면을 클릭하는 순간 오버레이를 숨기고 게임에 강제로 포커스를 줍니다.
            overlay.addEventListener("click", () => {
                overlay.style.display = "none";
                container.focus();
                // Ruffle 내부 요소에도 포커스 전달
                const canvas = container.querySelector("canvas");
                if (canvas) canvas.focus();
            });

            // 게임 도중 클릭해도 다시 키보드가 활성화되도록 합니다.
            container.addEventListener("mousedown", () => {
                container.focus();
            });
        });
    </script>
</body>
</html>
