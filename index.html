<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heeroz - Perfect Response Fix</title>
    <style>
        /* 1. 화면 구성 및 일본어 시스템 폰트 지정 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: #fff; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            /* 일본어 렌더링을 위해 일본어 전용 시스템 폰트를 우선순위로 설정합니다 */
            font-family: "MS Gothic", "Yu Gothic", "Meiryo", "맑은 고딕", sans-serif;
        }

        #game-wrapper {
            flex: 1; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
        }

        #ruffle-container {
            width: 100%;
            height: 100%;
            display: block;
            /* 텍스트 렌더링 최적화 옵션 추가 */
            text-rendering: optimizeLegibility;
        }

        /* 2. 컨트롤러: 터치 간섭 방지 설정 */
        #mobile-controller {
            width: 100%;
            height: 180px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            box-sizing: border-box;
            background: #111;
            border-top: 1px solid #333;
            z-index: 10;
            touch-action: none; 
        }

        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; }
        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border: 2px solid #555; border-radius: 50%; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; user-select: none; 
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }
        .fire { width: 90px; height: 90px; background: rgba(255,0,0,0.3); border-color: #f00; font-weight: bold; font-size: 20px; }

        @media (pointer: fine) { 
            #mobile-controller { display: none; } 
            #game-wrapper { height: 100vh; } 
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container"></div>
    </div>

    <div id="mobile-controller">
        <div class="d-pad">
            <div class="btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="btn right" data-key="ArrowRight" data-code="39">▶</div>
            <div class="btn down" data-key="ArrowDown" data-code="40">▼</div>
        </div>
        <div class="btn fire" data-key=" " data-code="32">FIRE</div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player = null;

        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            container.appendChild(player);

            player.load({
                url: "heeroz.swf",
                backgroundColor: "#000000",
                letterbox: "on",
                scale: "showAll",
                forceScale: true,
                /* 인코딩 안정화 및 외부 접근 허용 옵션 추가 */
                wmode: "opaque",
                allowScriptAccess: "always"
            }).then(() => {
                player.style.width = "100%";
                player.style.height = "100%";
                player.focus();
            });

            // 3. 입력 반응성 보강 로직
            const handleKey = (type, key, code) => {
                if (!player) return;
                player.focus();

                const event = new KeyboardEvent(type, {
                    key: key,
                    keyCode: parseInt(code),
                    which: parseInt(code),
                    bubbles: true,
                    cancelable: true
                });
                
                player.dispatchEvent(event);
            };

            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                const key = btn.getAttribute('data-key');
                const code = btn.getAttribute('data-code');

                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    handleKey('keydown', key, code);
                }, { passive: false });

                const endTouch = (e) => {
                    e.preventDefault();
                    handleKey('keyup', key, code);
                };

                btn.addEventListener('touchend', endTouch, { passive: false });
                btn.addEventListener('touchcancel', endTouch, { passive: false });
            });

            document.addEventListener('mousedown', () => { if(player) player.focus(); });
        });
    </script>
</body>
</html>
