<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Heeroz Shooting Game</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        /* 게임 크기에 맞춰 컨테이너 설정 */
        #waflashContainer { width: 550px; height: 400px; outline: none; }
        canvas { width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="waflashContainer" tabindex="0">
        <canvas id="waflashCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/clshort/waflash-demo@master/release/waflash.js"></script>
    
    <script>
        var config = {
            swfUrl: "heeroz.swf",
            wmode: "direct",
            allowScriptAccess: "always"
        };

        // 페이지 로드 완료 후 실행
        window.onload = function() {
            if (typeof WAFlash !== 'undefined') {
                WAFlash.run(config);
                // 실행 즉시 게임 창에 포커스를 주어 키보드 활성화
                setTimeout(function() {
                    document.getElementById('waflashContainer').focus();
                }, 1000);
            } else {
                alert("엔진 로드에 실패했습니다. 인터넷 연결이나 주소를 확인해주세요.");
            }
        };

        // 게임 도중 클릭해도 다시 키보드가 작동하도록 설정
        document.addEventListener('click', function() {
            document.getElementById('waflashContainer').focus();
        });
    </script>
</body>
</html>
