<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Heeroz - Shooting Game</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #waflashContainer { width: 550px; height: 400px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="waflashContainer">
        <canvas id="waflashCanvas"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/clshort/waflash-demo@master/release/waflash.js"></script>
    <script>
        var config = {
            swfUrl: "heeroz.swf",
            wmode: "direct",
            menu: "false",
            allowScriptAccess: "always",
            scale: "showAll"
        };
        // 페이지 로드 시 자동으로 게임에 포커스를 줍니다.
        window.onload = function() {
            WAFlash.run(config);
            document.getElementById('waflashCanvas').focus();
        };
    </script>
</body>
</html>
